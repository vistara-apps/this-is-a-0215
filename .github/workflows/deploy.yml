name: Deploy to Vercel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      env:
        NODE_OPTIONS: --max-old-space-size=4096
        
    - name: Deploy to Vercel (Production)
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && secrets.VERCEL_TOKEN != ''
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-args: '--prod'
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        
    - name: Deploy to Vercel (Preview)
      if: (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master') && secrets.VERCEL_TOKEN != ''
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-args: '--no-wait'
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        github-comment: true
        github-deployment: false
        
    - name: Build Success Notification
      if: secrets.VERCEL_TOKEN == ''
      run: |
        echo "✅ Build completed successfully!"
        echo "📝 To enable Vercel deployment, add the following secrets to your repository:"
        echo "   - VERCEL_TOKEN"
        echo "   - VERCEL_ORG_ID" 
        echo "   - VERCEL_PROJECT_ID"
        echo "📖 See docs/DEPLOYMENT.md for setup instructions"
        
    - name: Comment PR with build status
      if: github.event_name == 'pull_request' && secrets.VERCEL_TOKEN == ''
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `✅ **Build completed successfully!**
            
            📝 **Note:** Vercel deployment is not configured for this repository.
            
            To enable automatic deployments, add the following secrets to your repository settings:
            - \`VERCEL_TOKEN\`
            - \`VERCEL_ORG_ID\`
            - \`VERCEL_PROJECT_ID\`
            
            📖 See \`docs/DEPLOYMENT.md\` for detailed setup instructions.`
          });
